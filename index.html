<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container">
        <div class="slider">

            <div class="slide active">
                <img src="https://picsum.photos/id/1015/1200/700" alt="">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1016/1200/700" alt="">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1018/1200/700" alt="">
            </div>

            <div class="slide">
                <img src="https://images.unsplash.com/photo-1530075568197-cbf64cf2cb64?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=8546baa067bae341a4fa3252f0b4bf9d&auto=format&fit=crop&w=1050&q=80" alt="">
            </div>

        </div>

        <button class="nav-btn prev">&#10094;</button>
        <button class="nav-btn next">&#10095;</button>

        <div class="dots"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
